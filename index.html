<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Marga MWP | Official Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --primary-blue: #00d2ff;
            --accent-orange: #ff8c00;
            --text-white: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Background Animasi Partikel Sederhana */
        .bg-animate {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1c2c 0%, #0a0b10 100%);
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .orb-blue {
            width: 400px;
            height: 400px;
            background: var(--primary-blue);
            top: -100px;
            left: -100px;
        }

        .orb-orange {
            width: 350px;
            height: 350px;
            background: var(--accent-orange);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Card Container */
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 90%;
            border-top: 4px solid var(--primary-blue);
            border-bottom: 4px solid var(--accent-orange);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-blue);
            margin-bottom: 20px;
            padding: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .highlight {
            color: var(--accent-orange);
            font-weight: bold;
        }

        /* Button Style */
        .btn-join {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(45deg, var(--primary-blue), #0081a7);
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s all ease;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-join:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.4);
            background: linear-gradient(45deg, var(--accent-orange), #e67e22);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="orb orb-blue"></div>
        <div class="orb orb-orange"></div>
    </div>

    <div class="container animate__animated animate__fadeInUp">
        <img src="https://ui-avatars.com/api/?name=MWP&background=00d2ff&color=fff&size=128&bold=true" alt="Logo MWP" class="profile-img">
        
        <h1 class="animate__animated animate__zoomIn animate__delay-1s">MARGA MWP</h1>
        
        <p class="animate__animated animate__fadeIn animate__delay-2s">
            Bukan sekadar nama, ini adalah <span class="highlight">keluarga</span>. Tunjukkan solidaritasmu, raih kejayaan bersama, dan jadilah bagian dari sejarah kami. Solid, Tangguh, Berani!
        </p>
        
        <a href="https://chat.whatsapp.com/GsDZEc1Y3HR8Llo9nSLLbI?mode=gi_t" class="btn-join animate__animated animate__pulse animate__infinite">
            GABUNG SEKARANG
        </a>

        <div class="footer">
            &copy; 2026 Marga MWP • Verified Community
        </div>
    </div>

</body>
</html>
